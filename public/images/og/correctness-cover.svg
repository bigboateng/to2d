<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Correctness - TO2D">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f0df" />
      <stop offset="100%" stop-color="#efe4cf" />
    </linearGradient>
    <pattern id="rules" width="1200" height="34" patternUnits="userSpaceOnUse">
      <line x1="0" y1="33.5" x2="1200" y2="33.5" stroke="rgba(51,43,36,0.07)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#rules)" opacity="0.55" />

  <rect x="42" y="42" width="1116" height="546" fill="rgba(255,252,245,0.8)" stroke="rgba(101,75,43,0.3)" />
  <rect x="42" y="42" width="1116" height="546" fill="none" stroke="rgba(255,255,255,0.45)" />

  <text x="86" y="122" fill="rgba(91,65,38,0.85)" font-family="Georgia, serif" font-size="18" letter-spacing="3">CORRECTNESS</text>
  <text x="86" y="215" fill="#1f1912" font-family="Georgia, serif" font-size="72" font-weight="700">Reliability Boundaries</text>
  <text x="86" y="292" fill="#1f1912" font-family="Georgia, serif" font-size="72" font-weight="700">in Browser Automation</text>

  <text x="86" y="360" fill="#2f261d" font-family="Georgia, serif" font-size="30">
    Defining boundaries that localize failures and
  </text>
  <text x="86" y="399" fill="#2f261d" font-family="Georgia, serif" font-size="30">
    turn system errors into useful operational signals.
  </text>

  <line x1="86" y1="520" x2="1114" y2="520" stroke="rgba(91,65,38,0.3)" />
  <text x="86" y="556" fill="#3b2a19" font-family="Georgia, serif" font-size="26">TO2D</text>
  <text x="745" y="556" fill="rgba(91,65,38,0.9)" font-family="Georgia, serif" font-size="22">Architectures for Reliable AI Systems</text>
</svg>
