  </text>
  <text x="600" y="128" text-anchor="middle" fill="#5A5A5A" font-family="Georgia, Times New Roman, serif" font-size="20" font-style="italic">
    Operator intent × dynamic environments × model behavior
  </text>

  <rect x="470" y="178" width="260" height="64" rx="5" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.4" />
  <text x="600" y="205" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="300">Operator</text>
  <text x="600" y="224" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="12">defines goal</text>

  <line x1="600" y1="242" x2="600" y2="276" stroke="#B5B5B5" stroke-width="1.6" />
  <polygon points="600,282 594,272 606,272" fill="#B5B5B5" />

  <rect x="410" y="294" width="380" height="94" rx="5" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.4" />
  <text x="600" y="328" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="300">Automation System</text>
  <text x="600" y="349" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="12">(LLM / Agent)</text>
  <text x="600" y="372" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="18">observe ’ reason ’ act</text>

  <line x1="600" y1="388" x2="600" y2="424" stroke="#B5B5B5" stroke-width="1.6" />
  <polygon points="600,430 594,420 606,420" fill="#B5B5B5" />

  <rect x="430" y="444" width="340" height="72" rx="36" fill="#F2F2F0" stroke="#DADADA" stroke-width="1.4" />
  <text x="600" y="472" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="300">Environment</text>
  <text x="600" y="492" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="12">(websites / software)</text>
  <text x="600" y="510" text-anchor="middle" fill="#5A5A5A" font-family="monospace" font-size="12">dynamic + changing</text>

  <line x1="170" y1="564" x2="1030" y2="564" stroke="#E8E8E6" stroke-width="1" />
  <text x="96" y="598" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22">TO2D</text>
  <text x="1104" y="598" text-anchor="end" fill="#8C8C8C" font-family="monospace" font-size="13">to2d.xyz</text>
