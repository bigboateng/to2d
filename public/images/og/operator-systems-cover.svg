<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Browser Automation Is an Operator System - TO2D">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#E8E8E6" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F7F7F5" />
  <rect width="1200" height="630" fill="url(#dotgrid)" />

  <text x="600" y="92" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="48" font-weight="300" letter-spacing="-0.4">
