<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Progress Requires Observability - TO2D">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#E8E8E6" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F7F7F5" />
  <rect width="1200" height="630" fill="url(#dotgrid)" />

  <text x="600" y="100" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="14" letter-spacing="3">OPERATORS / OBSERVABILITY</text>

  <text x="600" y="170" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="300" letter-spacing="-0.5">Progress Requires Observability</text>

  <!-- state A -->
  <rect x="220" y="240" width="200" height="70" rx="5" fill="#FFFFFF" stroke="#C89B2C" stroke-width="1.4" />
  <text x="320" y="272" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="16">state A</text>
  <text x="320" y="296" text-anchor="middle" fill="#C89B2C" font-family="monospace" font-size="13">captcha required</text>

  <!-- state B -->
  <rect x="780" y="240" width="200" height="70" rx="5" fill="#FFFFFF" stroke="#3C7A52" stroke-width="1.4" />
  <text x="880" y="272" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="16">state B</text>
  <text x="880" y="296" text-anchor="middle" fill="#3C7A52" font-family="monospace" font-size="13">normal login</text>

  <!-- converging lines -->
  <line x1="320" y1="310" x2="320" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <line x1="880" y1="310" x2="880" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <line x1="320" y1="340" x2="600" y2="370" stroke="#B5B5B5" stroke-width="1.4" />
  <line x1="880" y1="340" x2="600" y2="370" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="600,374 596,366 604,366" fill="#B5B5B5" />

  <!-- g(x) label -->
  <text x="600" y="360" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">g(x)</text>

  <!-- observation -->
  <rect x="460" y="380" width="280" height="60" rx="5" fill="#F2F2F0" stroke="#DADADA" stroke-width="1.4" />
  <text x="600" y="400" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">observation</text>
  <text x="600" y="424" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="16">"login page"</text>

  <!-- arrow to agent -->
  <line x1="600" y1="440" x2="600" y2="466" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="600,470 596,462 604,462" fill="#B5B5B5" />

  <!-- agent -->
  <rect x="500" y="474" width="200" height="50" rx="5" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.4" />
  <rect x="492" y="492" width="8" height="8" rx="1" fill="#E8E8E6" />
  <rect x="700" y="492" width="8" height="8" rx="1" fill="#E8E8E6" />
  <text x="600" y="496" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="16">agent</text>
  <text x="600" y="516" text-anchor="middle" fill="#C89B2C" font-family="monospace" font-size="13">decision ?</text>

  <!-- footer -->
  <line x1="200" y1="570" x2="1000" y2="570" stroke="#E8E8E6" stroke-width="1" />
  <text x="86" y="600" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22">TO2D</text>
  <text x="600" y="600" text-anchor="middle" fill="#5A5A5A" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="300">Systems cannot improve what they cannot see.</text>
</svg>
