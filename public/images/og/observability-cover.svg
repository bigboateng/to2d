<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Progress Requires Observability - TO2D">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#E8E8E6" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F7F7F5" />
  <rect width="1200" height="630" fill="url(#dotgrid)" />

  <text x="600" y="140" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="14" letter-spacing="3">OPERATORS / OBSERVABILITY</text>

  <text x="600" y="250" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="300" letter-spacing="-0.5">Agents act on observations,</text>
  <text x="600" y="320" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="300" letter-spacing="-0.5">not reality.</text>

  <text x="600" y="420" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="28" letter-spacing="1">a_t = &#x3C0;( y_t ),     y_t &#x2260; x_t</text>

  <line x1="200" y1="530" x2="1000" y2="530" stroke="#E8E8E6" stroke-width="1" />
  <text x="86" y="574" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22">TO2D</text>
  <text x="600" y="574" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13" letter-spacing="1.5">PROGRESS REQUIRES OBSERVABILITY</text>
</svg>
