<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Language Models - TO2D">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#E8E8E6" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F7F7F5" />
  <rect width="1200" height="630" fill="url(#dotgrid)" />

  <text x="600" y="72" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="48" font-weight="300">Language Models</text>
  <text x="600" y="108" text-anchor="middle" fill="#5A5A5A" font-family="Georgia, Times New Roman, serif" font-size="20" font-style="italic">Beyond prompt engineering.</text>

  <!-- Row 1 -->

  <!-- Domain Operator -->
  <circle cx="240" cy="240" r="46" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.2" />
  <circle cx="240" cy="240" r="34" fill="none" stroke="#E8E8E6" stroke-width="0.6" />
  <text x="240" y="250" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="32">⊙</text>
  <text x="240" y="308" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Domain Operator</text>

  <!-- Representation Mapping -->
  <text x="600" y="232" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="26">A</text>
  <line x1="624" y1="226" x2="680" y2="226" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="686,226 678,221 678,231" fill="#B5B5B5" />
  <text x="710" y="232" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="26">B</text>
  <text x="654" y="252" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="11">M : A → B</text>
  <text x="654" y="308" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Representation Map</text>

  <!-- Deterministic Boundary -->
  <rect x="924" y="204" width="64" height="64" rx="6" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.2" />
  <rect x="936" y="216" width="40" height="40" rx="3" fill="none" stroke="#E8E8E6" stroke-width="0.8" />
  <text x="956" y="243" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="24">□</text>
  <text x="956" y="308" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Deterministic Boundary</text>

  <!-- Row 2 -->

  <!-- Error Signals -->
  <text x="240" y="420" text-anchor="middle" fill="#C89B2C" font-family="monospace" font-size="48">Δ</text>
  <text x="240" y="470" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Error Signals</text>

  <!-- Environment Discovery -->
  <text x="600" y="420" text-anchor="middle" fill="#3C7A52" font-family="monospace" font-size="48">E</text>
  <text x="600" y="470" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Environment Discovery</text>

  <!-- Model Operator -->
  <text x="960" y="412" text-anchor="middle" fill="#2A2A2A" font-family="monospace" font-size="26">M(x)</text>
  <text x="960" y="434" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="11">y ~ M(x)</text>
  <text x="960" y="470" text-anchor="middle" fill="#8C8C8C" font-family="monospace" font-size="13">Model Operator</text>

  <!-- Caption -->
  <text x="600" y="534" text-anchor="middle" fill="#8C8C8C" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic">Primitives for building systems with language models.</text>

  <!-- Footer -->
  <line x1="200" y1="572" x2="1000" y2="572" stroke="#E8E8E6" stroke-width="1" />
  <text x="86" y="604" fill="#1A1A1A" font-family="Georgia, Times New Roman, serif" font-size="22">TO2D</text>
  <text x="1114" y="604" text-anchor="end" fill="#8C8C8C" font-family="monospace" font-size="12">to2d.xyz</text>
</svg>
