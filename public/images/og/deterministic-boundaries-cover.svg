<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Deterministic Boundaries for Probabilistic Systems - TO2D">
  <defs>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#E8E8E6" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F7F7F5" />
  <rect width="1200" height="630" fill="url(#dotgrid)" />

  <!-- Title -->
  <text x="600" y="96" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="300" letter-spacing="-0.5">
    The task is richer than the guarantees.
  </text>

  <!-- Subtitle -->
  <text x="600" y="142" text-anchor="middle" fill="#5A5A5A" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="300">
    But we force models to satisfy both through the same channel.
  </text>

  <!-- PPP Diagram PPP -->

  <!-- Domain task  left -->
  <text x="310" y="218" text-anchor="middle" fill="#2A2A2A" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="17">
    domain task
  </text>
  <text x="310" y="248" text-anchor="middle" fill="#8C8C8C" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="15" font-style="italic">
    "help cure cancer"
  </text>

  <!-- System constraints  right -->
  <text x="890" y="218" text-anchor="middle" fill="#2A2A2A" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="17">
    system constraints
  </text>
  <text x="890" y="248" text-anchor="middle" fill="#8C8C8C" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="15" font-style="italic">
    "capitalize every 3rd word"
  </text>

  <!-- Arrow: domain task ’ down then right into LLM -->
  <line x1="310" y1="268" x2="310" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <line x1="310" y1="340" x2="520" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="526,340 516,335 516,345" fill="#B5B5B5" />

  <!-- Arrow: constraints ’ down then left into LLM -->
  <line x1="890" y1="268" x2="890" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <line x1="890" y1="340" x2="680" y2="340" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="674,340 684,335 684,345" fill="#B5B5B5" />

  <!-- LLM box -->
  <rect x="528" y="314" width="144" height="54" rx="4" fill="#FFFFFF" stroke="#DADADA" stroke-width="1.2" />

  <!-- Connector pins  left side -->
  <rect x="521" y="328" width="7" height="7" rx="1" fill="#E8E8E6" />
  <rect x="521" y="348" width="7" height="7" rx="1" fill="#E8E8E6" />

  <!-- Connector pins  right side -->
  <rect x="672" y="328" width="7" height="7" rx="1" fill="#E8E8E6" />
  <rect x="672" y="348" width="7" height="7" rx="1" fill="#E8E8E6" />

  <!-- LLM label -->
  <text x="600" y="348" text-anchor="middle" fill="#2A2A2A" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="19">
    LLM M
  </text>

  <!-- Arrow: LLM ’ candidate output -->
  <line x1="600" y1="368" x2="600" y2="440" stroke="#B5B5B5" stroke-width="1.4" />
  <polygon points="600,448 595,438 605,438" fill="#B5B5B5" />

  <!-- Candidate output label -->
  <text x="600" y="480" text-anchor="middle" fill="#5A5A5A" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="17">
    candidate output
  </text>

  <!-- PPP Footer PPP -->
  <line x1="200" y1="564" x2="1000" y2="564" stroke="#E8E8E6" stroke-width="1" />
  <text x="86" y="598" fill="#1A1A1A" font-family="Georgia, 'Times New Roman', serif" font-size="22">TO2D</text>
  <text x="600" y="598" text-anchor="middle" fill="#8C8C8C" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="13" letter-spacing="1.5">
    DETERMINISTIC BOUNDARIES FOR PROBABILISTIC SYSTEMS
  </text>
</svg>
